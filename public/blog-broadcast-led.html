<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7.680 Hz, P1.9, 16 Bit — LED Broadcast Standard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060608;
    --txt: #f0f0f0;
    --lime: #ADD034;
  }
  body {
    background-color: var(--bg);
    color: var(--txt);
    font-family: 'Outfit', sans-serif;
    line-height: 1.6;
    padding: 0;
    margin: 0;
  }
  .article-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px;
  }
  h1, h2, h3 {
    font-family: 'Syne', sans-serif;
    color: #ffffff;
  }
  h1 { font-size: 2.5rem; margin-bottom: 30px; letter-spacing: -0.02em; }
  h2 { font-size: 1.7rem; color: var(--lime); margin-top: 50px; margin-bottom: 20px; }
  h3 { font-size: 1.3rem; margin-top: 30px; color: #ffffff;}
  a { color: var(--lime); text-decoration: none; display: inline-flex; align-items: center; gap: 8px;}
  a:hover { text-decoration: underline; }
  a.back-btn { 
    padding: 10px 20px; margin-bottom: 40px; 
    border: 1px solid rgba(173, 208, 52, 0.3); border-radius: 40px; 
    font-size: 14px; font-weight: 500; transition: 0.3s; 
  }
  a.back-btn:hover { background: var(--lime); color: #000; border-color: var(--lime); text-decoration: none;}
  table { width: 100%; border-collapse: collapse; margin: 30px 0; background: #0A0A0C; border-radius: 8px; overflow: hidden; }
  th, td { border-bottom: 1px solid #222; padding: 15px 20px; text-align: left; }
  th { background: #111; color: var(--lime); font-weight: 600; border-bottom: 2px solid var(--lime); }
  td { font-size: 15px; color: #cccccc;}
  blockquote { 
    border-left: 4px solid var(--lime); margin: 30px 0; color: #999; 
    font-style: italic; background: #0C0C10; padding: 20px; border-radius: 4px; 
    font-size: 15px; border-top-right-radius: 8px; border-bottom-right-radius: 8px; 
  }
  code { background: #111; padding: 3px 8px; border-radius: 4px; font-family: monospace; color: var(--lime); }
  hr { border: 0; height: 1px; background: #222; margin: 50px 0; }
  img { max-width: 100%; border-radius: 8px; margin: 20px 0;}
  ul, ol { padding-left: 20px; color: #cccccc; font-size: 16px; margin-bottom: 20px; }
  li { margin-bottom: 10px; }
  .article-meta {
    font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 20px; display: block;
  }
</style>
</head>
<body>
<div class="article-container">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Zurück zur Website
  </a>
  <span class="article-meta">Technik • 10 Kwiecień 2026</span>
  <div id="rendered">Wczytywanie artykułu...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  window.onload = async () => {
    try {
        const response = await fetch('/artikel_technik_absen_novastar.md');
        if (!response.ok) throw new Error('Brak pliku MD');
        const text = await response.text();
        const rawContent = text.replace(/---[\s\S]*?---/, ''); // Usuń frontmatter
        document.getElementById('rendered').innerHTML = marked.parse(rawContent);
    } catch(e) {
        document.getElementById('rendered').innerHTML = 'Nie udało się wczytać artykułu technologicznego.';
    }
  };
</script>
</body>
</html>
