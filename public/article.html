<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigEvent - Blog Article</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0C0C;
    --txt: #f0f0f0;
    --lime: #ADD034;
    --font-head: 'Outfit', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  body {
    background-color: var(--bg);
    color: var(--txt);
    font-family: var(--font-body);
    line-height: 1.6;
    padding: 0;
    margin: 0;
  }
  .article-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px;
  }
  h1, h2, h3 {
    font-family: var(--font-head);
    color: #ffffff;
  }
  h1 { font-size: 2.5rem; margin-bottom: 30px; letter-spacing: -0.02em; }
  h2 { font-size: 1.7rem; color: var(--lime); margin-top: 50px; margin-bottom: 20px; }
  h3 { font-size: 1.3rem; margin-top: 30px; color: #ffffff;}
  a { color: var(--lime); text-decoration: none; display: inline-flex; align-items: center; gap: 8px;}
  a:hover { text-decoration: underline; }
  a.back-btn { 
    padding: 10px 20px; margin-bottom: 40px; 
    border: 1px solid rgba(173, 208, 52, 0.3); border-radius: 40px; 
    font-size: 14px; font-weight: 500; transition: 0.3s; 
  }
  a.back-btn:hover { background: var(--lime); color: #000; border-color: var(--lime); text-decoration: none;}
  table { width: 100%; border-collapse: collapse; margin: 30px 0; background: #141414; border-radius: 8px; overflow: hidden; }
  th, td { border-bottom: 1px solid #222; padding: 15px 20px; text-align: left; }
  th { background: #1A1A1A; color: var(--lime); font-weight: 600; border-bottom: 2px solid var(--lime); font-family: var(--font-head); letter-spacing: 0.02em; }
  td { font-size: 15px; color: #cccccc;}
  blockquote { 
    border-left: 4px solid var(--lime); margin: 30px 0; color: #999; 
    font-style: italic; background: #141414; padding: 20px; border-radius: 4px; 
    font-size: 15px; border-top-right-radius: 8px; border-bottom-right-radius: 8px; 
  }
  code { background: #1A1A1A; padding: 3px 8px; border-radius: 4px; font-family: monospace; color: var(--lime); }
  hr { border: 0; height: 1px; background: #333; margin: 50px 0; }
  img { max-width: 100%; border-radius: 8px; margin: 20px 0;}
  ul, ol { padding-left: 20px; color: #cccccc; font-size: 16px; margin-bottom: 20px; }
  li { margin-bottom: 10px; }
  .article-meta {
    font-size: 13px; color: #777; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 20px; display: block;
    font-family: var(--font-body);
  }
</style>
</head>
<body>
<div class="article-container">
  <a href="/" class="back-btn" id="backBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    <span id="backText">Return</span>
  </a>
  
  <div id="rendered">
     <div style="text-align:center; padding: 50px; color: #666; font-family: var(--font-head);">
       Loading Article...
     </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // Translations for the back button and errors
  const t = {
    'pl': { back: 'Wróć na stronę główną', err: 'Nie udało się wczytać artykułu.' },
    'en': { back: 'Return to Homepage', err: 'Failed to load article.' },
    'de': { back: 'Zurück zur Website', err: 'Artikel konnte nicht geladen werden.' }
  };

  window.onload = async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id') || 'p1';
    let lang = urlParams.get('lang') || 'en';
    
    // Fallback if lang isn't supported
    if (!['pl', 'en', 'de'].includes(lang)) lang = 'en';

    document.getElementById('backText').innerText = t[lang].back;
    document.documentElement.lang = lang;

    const fileToFetch = `/${id}-${lang}.md`;

    try {
        const response = await fetch(fileToFetch);
        if (!response.ok) throw new Error('MD file missing');
        const text = await response.text();
        
        // Extract frontmatter Category & Date for the meta line
        const catMatch = text.match(/category:\s*"([^"]+)"/);
        const dateMatch = text.match(/date:\s*"([^"]+)"/);
        const cat = catMatch ? catMatch[1] : 'Blog';
        let date = dateMatch ? dateMatch[1] : '';

        // Format Date nicely based on lang if it exists (assuming YYYY-MM-DD input)
        if(date) {
            try {
                const d = new Date(date);
                date = d.toLocaleDateString(lang === 'en' ? 'en-US' : (lang === 'pl' ? 'pl-PL' : 'de-DE'), { year: 'numeric', month: 'long', day: 'numeric' });
            } catch(e) {}
        }
        
        let metaHtml = '';
        if(cat || date) {
           metaHtml = `<span class="article-meta">${cat} • ${date}</span>`;
        }

        const rawContent = text.replace(/---[\s\S]*?---/, ''); // Usuń frontmatter
        let parsed = marked.parse(rawContent);

        // Inject the meta under the first H1 if present, otherwise at top
        if (parsed.includes('<h1')) {
           parsed = parsed.replace(/(<h1[^>]*>.*?<\/h1>)/i, `$1\n${metaHtml}`);
        } else {
           parsed = metaHtml + parsed;
        }

        document.getElementById('rendered').innerHTML = parsed;
    } catch(e) {
        document.getElementById('rendered').innerHTML = `<div style="text-align:center;color:red;padding:50px;">${t[lang].err}</div>`;
    }
  };
</script>
</body>
</html>
