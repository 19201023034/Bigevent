        },

          "@type": "Question",

        },
        {
          "@type": "Question",
          "name": "Na czym polega wirtualna produkcja w studiu LED?",
          "acceptedAnswer": {
            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "Czy ekrany LED BigEvent działają na zewnątrz?",

        }
